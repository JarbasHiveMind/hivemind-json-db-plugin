name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-plain:
    name: "JSON (no encryption)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" || pip install -e .
      - run: pip install pytest
      - run: pytest tests/test_jsondb.py -q -p no:ovoscope

  test-cipher:
    name: "JSON + SQLCipher"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install sqlcipher system library
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev
      - run: pip install -e ".[cipher]"
      - run: pip install pytest
      - run: pytest tests/test_jsondb.py -q -p no:ovoscope
